# Include di dalam server { } — root /var/www/alfurqonbekasi.id;
# Penting: /admin/* harus fallback ke /admin/index.html (bukan index.html situs).

location /metronic/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
}

location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
}

location /bismillah/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
}

location /admin/ {
    try_files $uri $uri/ /admin/index.html;
}

location / {
    try_files $uri $uri/ /index.html;
}
