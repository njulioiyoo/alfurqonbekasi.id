# Contoh nginx untuk dev/prod Alfurqon (sesuaikan root ke folder dist hasil `npm run build`).
# Di server: jalankan `frontend/scripts/fix-nginx-admin-spa-remote.sh` jika refresh /admin/* blank.
# Penting: /metronic/ harus dilayani sebagai file statis — jangan di-fallback ke index.html.

root /var/www/alfurqon/dist;

location /metronic/ {
  try_files $uri =404;
  expires 7d;
  add_header Cache-Control "public";
}

location /assets/ {
  try_files $uri =404;
  expires 7d;
  add_header Cache-Control "public";
}

# WAJIB: tanpa ini, refresh /admin/dashboard mengembalikan index.html situs (CMS blank).
location /admin/ {
  try_files $uri $uri/ /admin/index.html;
}

location / {
  try_files $uri $uri/ /index.html;
}
